<!DOCTYPE html>
<html>
	<head>
		<title>Network Media</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<style>
			:root {
				--color-primary: #E50914;
				--gap: 20px;
			}
			html, body {
				margin: 0;
				padding: 0;
				font-family: Roboto, sans-serif;
				background-color: #000;
			}

			.container {
				margin-left: auto;
				margin-right: auto;
				max-width: 1600px;
				padding-left: 12px;
				padding-right: 12px;
				box-sizing: border-box;
			}

			.app__header {
				height: 64px;
				display: flex;
				gap: 40px;
				align-items: center;
			}
			.app__header h1 {
				margin: 0;
				font-size: 24px;
				line-height: 32px;
				letter-spacing: -1.2px;
				text-transform: uppercase;
				color: var(--color-primary);
			}
			.app__header h2 {
				color: #C6C6C7;
				font-size: 14px;
				line-height: 20px;
			}
			.app__header h2 a {
				color: inherit;
			}

			ul {
				margin: 0;
				padding: 0;
				list-style: none;
				display: grid;
				grid-template-columns: repeat(4, 25%);
				gap: var(--gap);
				row-gap: var(--gap);
				box-sizing: border-box;
			}
			ul li {
				display: block;
			}

			#video {
				position: absolute;
				left: 50%;
				top: 0;
				transform: translateX(-50%);
				width: 100%;
				height: 100vh;
				background: #000000df;
				display: grid;
				align-items: center;
				justify-content: center;
			}
			#video button {
				z-index: 1;
				position: fixed;
				top: 24px;
				right: 24px;
				width: 48px;
				height: 48px;
				border: none;
				background: none;
			}
			#video button::before,
			#video button::after {
				position: absolute;
				left: 50%;
				top: 50%;
				width: 80%;
				height: 2px;
				background: #dcdcdc;
				content: '';
			}
			#video button::before {
				transform: translate(-50%,-50%) rotate(45deg);
			}
			#video button::after {
				transform: translate(-50%,-50%) rotate(-45deg);
			}
			#video video {
				display: block;
				width: auto-fit;
				height: auto-fit;
			}

			.card {
				position: relative;
				padding: 0;
				width: 100%;
				height: 100%;
				border: none;
				background: none;
				font-size: 13px;
				line-height: 20px;
			}
			.card::before,
			.card canvas {
				aspect-ratio: 16/9;
			}
			.card::before {
				display: block;
				content: "";
			}
			.card canvas {
				position: absolute;
				left: 0;
				top: 0;
				width: 100%;
			}
			.card span {
				padding: 8px 0;
				display: block;
				color: #fff;
				white-space: nowrap;
				overflow: hidden;
				text-align: left;
				text-overflow: ellipsis;
			}

			#thumbnailVideo {
				display: none;
			}
		</style>
	</head>
	<body>
		<header class="app__header container">
			<h1>NetMedia</h1>
			<h2><a href="http://{{SERVER_HOST}}/" target="_blank">{{SERVER_HOST}}</a></h2>
		</header>

		<div class="container">
			<ul id="elmList"></ul>
			<video id="thumbnailVideo"></video>
		</div>

		<script>
			function selectVideo(file) {
				const elm = document.createElement('DIV');
				elm.id = "video";

				const video = document.createElement('VIDEO');
				video.setAttribute('controls', '');
				video.setAttribute('autoplay', '');
				video.setAttribute('playsinline', 'inline');

				function closeVideo() {
					video.pause();
					document.body.removeChild(elm);
				}

				const closeBtn = document.createElement('BUTTON');
				elm.appendChild(closeBtn);

				closeBtn.addEventListener('click', () => {
					closeVideo();
				});

				video.addEventListener('canplay', () => {
					video.requestFullscreen();
				});
				video.addEventListener('ended', () => {
					closeVideo();
				});

				video.src = `/api/video/play?s=${encodeURI(file)}`;

				elm.appendChild(video);
				document.body.appendChild(elm);
			}

			// fetch list
			(async () => {
				const { items } = await fetch('/api/list').then((r) => r.json());
				const elms = [];

				for (const item of items) {
					const li = document.createElement('LI');
					const btn = document.createElement('BUTTON');
					const span = document.createElement('SPAN');
					const canvas = document.createElement('CANVAS');

					btn.videoLink = item;
					btn.classList.add('card');
					btn.addEventListener('click', () => selectVideo(item));


					span.innerText = (() => {
						const i = item.length - 4;
						if (item[i] !== '.') {
							return item;
						}

						return item.substring(0, i);
					})();

					elms.push(btn);

					btn.appendChild(canvas);
					btn.appendChild(span);
					li.appendChild(btn);
					elmList.appendChild(li);
				}

				let idx = 0;
				function insertThumbnail() {
					const btn = elms[idx];
					if (btn === undefined) return;

					const canvas = btn.querySelector('canvas');

					idx++;

					const video = document.querySelector('#thumbnailVideo');
					video.src = `/api/video/play?s=${encodeURI(btn.videoLink)}`;

					video.onloadeddata = () => {
						setTimeout(() => {
							const rect = canvas.getBoundingClientRect();
							canvas.width = rect.width;
							canvas.height = rect.height;

							const ctx = canvas.getContext('2d');
							const vw = video.videoWidth;
							const vh = video.videoHeight;
							const cw = rect.width;
							const ch = rect.height;
							const scale = Math.max(cw / vw, ch / vh);
							const sw = vw * scale;
							const sh = vh * scale;

							ctx.drawImage(video, (cw - sw) / 2, (ch - sh) / 2, sw, sh);
							insertThumbnail();
						}, 100);
					}
				}

				insertThumbnail();
			})();
		</script>
	</body>
</html>
